services:
  # Ephemeral storage cache layer
  redis:
    image: redis:7-alpine
    container_name: ledger-redis-core
    ports:
      - "6379:6379"
    restart: always

  # Distributed streaming coordinate manager
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: ledger-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # High-throughput streaming event bus pipeline
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ledger-kafka-broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # High-performance Core API written in Go
  go-api:
    build:
      context: ./intelligent-ledger-backend
      dockerfile: Dockerfile
    container_name: ledger-go-api
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - redis
    env_file:
      - .env
    restart: on-failure

  # AI Engine worker written in Python
  python-worker:
    build:
      context: ./intelligent-ledger-worker
      dockerfile: Dockerfile
    container_name: ledger-python-worker
    depends_on:
      - kafka
    env_file:
      - .env
    restart: on-failure
